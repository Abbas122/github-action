on:
  workflow_dispatch:
    inputs:
      environments:
        description: this is  mesages to display
        default: 'dev'
        required: true
        type: choice
        options:
          - dev
          - prod
          - staging
jobs:
  Code:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        run: echo "code is been cloned"
  Build:
    needs: Code
    runs-on: ubuntu-latest
    steps:
      - name: buikd docker container
        run: echo "build successfully" 
  Test:
    needs: Build
    runs-on: ubuntu-latest
    steps:
      - name: Test are doing
        run: echo "test has Done"
  Deploye:
    if: inputs.environments  == 'dev'
    
    needs: Test
    runs-on: ubuntu-latest
    steps:
      - name:  Deploye Steps
        run: echo "deploye is done "
